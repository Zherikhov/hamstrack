name: CI/CD

# Tests run on every push and on PRs targeting main.
# Deploy jobs run only when code lands on main — and only after tests pass.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # GitHub spins up a real PostgreSQL alongside the job
    # so our Spring Boot tests have an actual DB to connect to
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hamstrack_test
          POSTGRES_USER: hamstrack
          POSTGRES_PASSWORD: hamstrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs — much faster

      - name: Build (compile check)
        run: ./mvnw clean package -DskipTests -B

      - name: Run tests
        run: ./mvnw test -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/hamstrack_test
          DB_USERNAME: hamstrack
          DB_PASSWORD: hamstrack
          # Dummy value for tests only — JwtService requires >= 32 bytes (HMAC-SHA256)
          JWT_SECRET: ci-only-jwt-secret-0123456789abcdef0123456789

  # Build the Docker image and push to GitHub Container Registry.
  # Gated on green tests; skipped entirely for branches and PRs.
  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # needed to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub, no setup needed

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hamstrack
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Deploy via AWS SSM — no open SSH port needed on the instance.
  # Inherits the main-only gate: skipped when build-and-push is skipped.
  # The hamstrack-deploy IAM user may only run AWS-RunShellScript on this
  # one instance (see docs/ops-prod-hardening.md §3).
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AWS_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "hamstrack deploy ${{ github.sha }}" \
            --parameters 'commands=["cd /opt/hamstrack && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d --remove-orphans && docker image prune -f"]' \
            --query 'Command.CommandId' --output text)
          echo "Command: $CMD_ID"
          # `wait` polls until the command finishes; it exits non-zero on failure
          aws ssm wait command-executed \
            --command-id "$CMD_ID" --instance-id "${{ secrets.AWS_INSTANCE_ID }}" || FAILED=1
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "${{ secrets.AWS_INSTANCE_ID }}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
          [ -z "$FAILED" ]
