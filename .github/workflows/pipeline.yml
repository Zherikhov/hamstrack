name: CI/CD

# Tests run on every push and on PRs targeting main.
# Deploy jobs run only when code lands on main — and only after tests pass.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # GitHub spins up a real PostgreSQL alongside the job
    # so our Spring Boot tests have an actual DB to connect to
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hamstrack_test
          POSTGRES_USER: hamstrack
          POSTGRES_PASSWORD: hamstrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs — much faster

      - name: Build (compile check)
        run: ./mvnw clean package -DskipTests -B

      - name: Run tests
        run: ./mvnw test -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/hamstrack_test
          DB_USERNAME: hamstrack
          DB_PASSWORD: hamstrack
          # Dummy value for tests only — JwtService requires >= 32 bytes (HMAC-SHA256)
          JWT_SECRET: ci-only-jwt-secret-0123456789abcdef0123456789

  # Build the Docker image and push to GitHub Container Registry.
  # Gated on green tests; skipped entirely for branches and PRs.
  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # needed to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub, no setup needed

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hamstrack
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # SSH into AWS EC2 and pull the new image.
  # Inherits the main-only gate: skipped when build-and-push is skipped.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/hamstrack
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
