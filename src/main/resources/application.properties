spring.application.name=hamstrack

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=P1D
jwt.refresh-token-expiration=P30D

# Mail (MailHog for local dev)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}

# App
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.mail-from=${MAIL_FROM:noreply@hamstrack.com}
app.registration.public-signup-enabled=true

# File storage (attachments): local (host filesystem) | s3.
# Profiles override the type: dc -> local, cloud -> s3.
app.storage.type=${STORAGE_TYPE:local}
app.storage.local.base-dir=${STORAGE_LOCAL_DIR:./data/attachments}
app.storage.s3.bucket=${STORAGE_S3_BUCKET:}
app.storage.s3.region=${STORAGE_S3_REGION:}
# endpoint + path-style-access only for S3-compatible stores (MinIO etc.); leave empty for AWS
app.storage.s3.endpoint=${STORAGE_S3_ENDPOINT:}
app.storage.s3.path-style-access=${STORAGE_S3_PATH_STYLE:false}
# Empty -> AWS SDK default credentials chain (env vars, ~/.aws, instance/task role)
app.storage.s3.access-key=${STORAGE_S3_ACCESS_KEY:}
app.storage.s3.secret-key=${STORAGE_S3_SECRET_KEY:}

# Upload limits
spring.servlet.multipart.max-file-size=${ATTACHMENT_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${ATTACHMENT_MAX_FILE_SIZE:25MB}
