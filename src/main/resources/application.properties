spring.application.name=hamstrack

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:15432/hamstrack}
spring.datasource.username=${DB_USERNAME:hamstrack}
spring.datasource.password=${DB_PASSWORD:hamstrack}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# JWT
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-64-characters-long!!}
jwt.access-token-expiration=PT15M
jwt.refresh-token-expiration=P30D

# Mail (MailHog for local dev)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# App
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.registration.public-signup-enabled=true
